<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Игра Жизнь</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Игра «Жизнь»</h1>
      <p class="subtitle">Выберите цвет, кликните по клеткам и запустите симуляцию.</p>

      <section class="controls">
        <button id="startBtn">Старт</button>
        <button id="stepBtn">Шаг</button>
        <button id="clearBtn">Очистить</button>
        <button id="randomBtn">Случайно</button>
        <label>
          Случайных клеток
          <input id="randomCountInput" type="number" min="1" max="2400" value="300" />
        </label>
        <label>
          Скорость
          <input id="speedInput" type="range" min="2" max="20" value="8" />
        </label>
      </section>

      <section class="palette" aria-label="Выбор цвета клетки">
        <span>Цвет:</span>
        <button class="color-btn active" data-color="1" aria-label="Цвет 1"></button>
        <button class="color-btn" data-color="2" aria-label="Цвет 2"></button>
        <button class="color-btn" data-color="3" aria-label="Цвет 3"></button>
        <button class="color-btn" data-color="4" aria-label="Цвет 4"></button>
        <button class="color-btn" data-color="5" aria-label="Цвет 5"></button>
      </section>

      <section class="workspace">
        <canvas id="grid" width="720" height="480" aria-label="Поле игры"></canvas>

        <aside class="stats" aria-label="Статистика">
          <h2>Шагов: <span id="stepCount">0</span></h2>
          <table>
            <thead>
              <tr>
                <th>Показатель</th>
                <th>Цвет 1</th>
                <th>Цвет 2</th>
                <th>Цвет 3</th>
                <th>Цвет 4</th>
                <th>Цвет 5</th>
                <th>Сумма</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <th scope="row">Добавлено вручную/случайно</th>
                <td id="added-1">0</td>
                <td id="added-2">0</td>
                <td id="added-3">0</td>
                <td id="added-4">0</td>
                <td id="added-5">0</td>
                <td id="added-total">0</td>
              </tr>
              <tr>
                <th scope="row">Сейчас на доске</th>
                <td id="current-1">0</td>
                <td id="current-2">0</td>
                <td id="current-3">0</td>
                <td id="current-4">0</td>
                <td id="current-5">0</td>
                <td id="current-total">0</td>
              </tr>
              <tr>
                <th scope="row">На доске за всё время</th>
                <td id="lifetime-1">0</td>
                <td id="lifetime-2">0</td>
                <td id="lifetime-3">0</td>
                <td id="lifetime-4">0</td>
                <td id="lifetime-5">0</td>
                <td id="lifetime-total">0</td>
              </tr>
            </tbody>
          </table>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
