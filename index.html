<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Игра Жизнь</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Игра «Жизнь»</h1>
      <p class="subtitle">Кликните по клеткам, чтобы оживить их, затем запустите симуляцию.</p>

      <section class="controls">
        <button id="startBtn">Старт</button>
        <button id="stepBtn">Шаг</button>
        <button id="clearBtn">Очистить</button>
        <button id="randomBtn">Случайно</button>
        <label>
          Скорость
          <input id="speedInput" type="range" min="2" max="20" value="8" />
        </label>
      </section>

      <canvas id="grid" width="720" height="480" aria-label="Поле игры"></canvas>
    </main>

    <script src="script.js"></script>
  </body>
</html>
